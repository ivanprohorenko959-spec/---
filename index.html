<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бот-калькулятор диет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s;
        }

        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        body.dark .card {
            background: #2d2d44;
            color: #eee;
        }

        .card h2 {
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        body.dark .form-group input,
        body.dark .form-group select {
            background: #3d3d5c;
            border-color: #555;
            color: white;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .macros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .macro-item {
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: #f7f7f7;
        }

        body.dark .macro-item {
            background: #3d3d5c;
        }

        .macro-value {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
        }

        .calories .macro-value { color: #667eea; }
        .protein .macro-value { color: #48bb78; }
        .fat .macro-value { color: #ed8936; }
        .carbs .macro-value { color: #4299e1; }

        .recipes-grid {


display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .recipe-card {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        body.dark .recipe-card {
            background: #3d3d5c;
        }

        .recipe-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .recipe-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            background: #667eea;
            color: white;
            margin-bottom: 10px;
        }

        .meal-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }

        body.dark .meal-card {
            background: #353553;
        }

        .day-menu {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .day-header {
            background: #f0f0f0;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        body.dark .day-header {
            background: #3d3d5c;
        }

        .day-content {
            padding: 15px;
            display: none;
        }

        .day-content.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .tab-btn.active {
            border-bottom: 3px solid #667eea;
            color: #667eea;
            font-weight: bold;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .filter-select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: white;
            font-size: 14px;
        }

        max-width: 768px {
            .header h1 { font-size: 1.8rem; }
            .macros-grid { grid-template-columns: repeat(2, 1fr); }
            .recipes-grid { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .btn-group .btn { width: 100%; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        body.dark .modal-content {
            background: #2d2d44;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥗 Бот-калькулятор диет</h1>
            <p>Подбери идеальный рацион под свои цели</p>


<button id="themeToggle" class="theme-btn">🌙 Тёмная тема</button>
        </div>

        <div class="card">
            <h2>📝 Ваши параметры</h2>
            <div class="form-group">
                <label>Возраст (лет):</label>
                <input type="number" id="age" min="15" max="120" placeholder="например, 30">
            </div>
            <div class="form-group">
                <label>Вес (кг):</label>
                <input type="number" id="weight" min="20" max="300" step="0.1" placeholder="например, 75">
            </div>
            <div class="form-group">
                <label>Ваша цель:</label>
                <div class="radio-group">
                    <label><input type="radio" name="goal" value="weight_loss"> 🏃‍♂️ Похудение</label>
                    <label><input type="radio" name="goal" value="maintain" checked> ⚖️ Поддержание</label>
                    <label><input type="radio" name="goal" value="muscle_gain"> 💪 Набор массы</label>
                </div>
            </div>
            <div class="form-group">
                <label>Уровень активности:</label>
                <select id="activity">
                    <option value="low">🛋️ Низкая</option>
                    <option value="moderate" selected>🚶 Средняя</option>
                    <option value="high">🏃‍♂️ Высокая</option>
                </select>
            </div>
            <button id="calculateBtn" class="btn btn-primary">📊 Рассчитать КБЖУ</button>
        </div>

        <div class="card" id="resultCard" style="display: none;">
            <h2>📈 Ваша суточная норма</h2>
            <div class="macros-grid">
                <div class="macro-item calories">
                    <span class="macro-value" id="caloriesValue">0</span>
                    <span class="macro-label">ккал</span>
                </div>
                <div class="macro-item protein">
                    <span class="macro-value" id="proteinValue">0</span>
                    <span class="macro-label">белки (г)</span>
                </div>
                <div class="macro-item fat">
                    <span class="macro-value" id="fatValue">0</span>
                    <span class="macro-label">жиры (г)</span>
                </div>
                <div class="macro-item carbs">
                    <span class="macro-value" id="carbsValue">0</span>
                    <span class="macro-label">углеводы (г)</span>
                </div>
            </div>
        </div>

        <div class="card" id="menuActions" style="display: none;">
            <h2>🍽️ Сгенерировать меню</h2>
            <div class="btn-group">
                <button id="generateDailyBtn" class="btn btn-secondary">📅 На день</button>
                <button id="generateWeeklyBtn" class="btn btn-secondary">📆 На неделю</button>
            </div>
        </div>

        <div class="card" id="menuDisplay" style="display: none;">
            <h2 id="menuTitle">🍳 Ваше меню</h2>
            <div id="menuContent"></div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" data-tab="recipes">📖 База рецептов</button>
                <button class="tab-btn" data-tab="search">🔍 Поиск</button>
            </div>
            <div id="recipesTab" class="tab-content active">
                <div id="recipesList" class="recipes-grid"></div>
            </div>
            <div id="searchTab" class="tab-content">
                <div class="search-filters">
                    <input type="text" id="searchInput" placeholder="🔎 Поиск по названию..." class="search-input">
                    <select id="mealTypeFilter" class="filter-select">
                        <option value="all">Все блюда</option>
                        <option value="breakfast">Завтрак</option>
                        <option value="lunch">Обед</option>
                        <option value="dinner">Ужин</option>
                        <o


ption value="snack">Перекус</option>
                    </select>
                </div>
                <div id="filteredRecipesList" class="recipes-grid"></div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Бот-калькулятор диет | Расчёты носят рекомендательный характер</p>
        </div>
    </div>

    <div id="recipeModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // БАЗА РЕЦЕПТОВ
        const recipes = [
            { id: 1, name: 'Овсянка с ягодами', ingredients: 'овсяные хлопья 50г, молоко 150мл, ягоды 50г', portion: 250, kcal_per_100: 90, protein_per_100: 3.5, fat_per_100: 2, carbs_per_100: 14, mealType: 'breakfast' },
            { id: 2, name: 'Яичница с овощами', ingredients: 'яйца 2шт, помидор, перец', portion: 200, kcal_per_100: 150, protein_per_100: 10, fat_per_100: 10, carbs_per_100: 5, mealType: 'breakfast' },
            { id: 3, name: 'Гречка с курицей', ingredients: 'гречка 100г, курица 150г', portion: 350, kcal_per_100: 130, protein_per_100: 12, fat_per_100: 4, carbs_per_100: 15, mealType: 'lunch' },
            { id: 4, name: 'Рыба с овощами', ingredients: 'рыба 150г, брокколи 100г', portion: 300, kcal_per_100: 110, protein_per_100: 15, fat_per_100: 5, carbs_per_100: 5, mealType: 'dinner' },
            { id: 5, name: 'Творог с мёдом', ingredients: 'творог 150г, мёд 10г', portion: 160, kcal_per_100: 140, protein_per_100: 12, fat_per_100: 5, carbs_per_100: 10, mealType: 'snack' },
            { id: 6, name: 'Салат Цезарь', ingredients: 'курица 100г, салат, сухарики', portion: 280, kcal_per_100: 140, protein_per_100: 14, fat_per_100: 8, carbs_per_100: 6, mealType: 'dinner' },
            { id: 7, name: 'Смузи банановый', ingredients: 'банан, йогурт 150мл', portion: 250, kcal_per_100: 85, protein_per_100: 3, fat_per_100: 2, carbs_per_100: 15, mealType: 'snack' },
            { id: 8, name: 'Омлет с сыром', ingredients: 'яйца 3шт, сыр 30г', portion: 220, kcal_per_100: 155, protein_per_100: 12, fat_per_100: 10, carbs_per_100: 3, mealType: 'breakfast' },
            { id: 9, name: 'Макароны с тунцом', ingredients: 'паста 100г, тунец 80г', portion: 300, kcal_per_100: 160, protein_per_100: 12, fat_per_100: 6, carbs_per_100: 18, mealType: 'lunch' },
            { id: 10, name: 'Картошка с курицей', ingredients: 'картофель 200г, курица 150г', portion: 380, kcal_per_100: 145, protein_per_100: 12, fat_per_100: 6, carbs_per_100: 16, mealType: 'dinner' },
            { id: 11, name: 'Йогурт с орехами', ingredients: 'йогурт 150мл, орехи 15г', portion: 165, kcal_per_100: 120, protein_per_100: 6, fat_per_100: 7, carbs_per_100: 8, mealType: 'snack' },
            { id: 12, name: 'Рис с овощами', ingredients: 'рис 80г, овощи 100г', portion: 320, kcal_per_100: 125, protein_per_100: 7, fat_per_100: 5, carbs_per_100: 18, mealType: 'lunch' }
        ];

        let currentKBJU = null;
        let currentMenu = null;

        function getPortionCalories(recipe) {
            return (recipe.kcal_per_100 * recipe.portion) / 100;
        }

        function calculateKBJU() {
            const age = parseInt(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const goal = document.querySelector('input[name="goal"]:checked').value;
            const activity = document.getElementById('activity').value;

            if (!age || age < 15 || age > 120) { alert('Введите возраст от 15 до 120'); return null; }
            if (!weight || weight < 20 || weight > 300) { alert('Введите вес от 20 до 300'); return null; }

            let bmr = 10 * weight + 6.25 * 165 - 5 * age - 161;
            let activityFactor = { low: 1.2, moderate: 1.375, high: 1.55 }[activity];
            let tdee = bmr * activityFactor;
            let calories = { weight_loss: tdee * 0.85, maintain: tdee, muscle_gain: tdee * 1.1 }[goal];
            
            let protein = (calories * 0.3) /4;
            let fat = (calories * 0.25) / 9;
            let carbs = (calories * 0.45) / 4;

            return { calories: Math.round(calories), protein: Math.round(protein), fat: Math.round(fat), carbs: Math.round(carbs) };
        }

        function displayKBJU(k) {
            document.getElementById('caloriesValue').innerText = k.calories;
            document.getElementById('proteinValue').innerText = k.protein;
            document.getElementById('fatValue').innerText = k.fat;
            document.getElementById('carbsValue').innerText = k.carbs;
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('menuActions').style.display = 'block';
        }

        function generateDailyMenu() {
            if (!currentKBJU) { alert('Сначала рассчитайте КБЖУ'); return; }
            let meals = ['breakfast', 'lunch', 'dinner', 'snack'];
            let dist = [0.25, 0.35, 0.25, 0.15];
            let menu = {};
            for (let i = 0; i < meals.length; i++) {
                let target = currentKBJU.calories * dist[i];
                let candidates = recipes.filter(r => r.mealType === meals[i]);
                if (candidates.length) {
                    let best = candidates[0];
                    let bestDiff = Math.abs(getPortionCalories(best) - target);
                    for (let j = 1; j < candidates.length; j++) {
                        let diff = Math.abs(getPortionCalories(candidates[j]) - target);
                        if (diff < bestDiff) { bestDiff = diff; best = candidates[j]; }
                    }
                    menu[meals[i]] = best;
                }
            }
            return menu;
        }

        function generateWeeklyMenu() {
            let week = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
            let weekly = [];
            for (let i = 0; i < 7; i++) {
                let daily = generateDailyMenu();
                weekly.push({ day: week[i], meals: daily });
            }
            return weekly;
        }

        function showDailyMenu(menu) {
            let html = '';
            let meals = { breakfast: '🥣 Завтрак', lunch: '🍲 Обед', dinner: '🍽️ Ужин', snack: '🍎 Перекус' };
            for (let [type, recipe] of Object.entries(menu)) {
                if (recipe) {
                    let kcal = getPortionCalories(recipe);
                    html += `<div class="meal-card" onclick="showRecipe(${recipe.id})">
                        <h3>${meals[type]}</h3>
                        <p><strong>${recipe.name}</strong></p>
                        <p>🔥 ${Math.round(kcal)} ккал | 🥩 ${(recipe.protein_per_100 * recipe.portion / 100).toFixed(1)}г белков</p>
                    </div>`;
                }
            }
            document.getElementById('menuContent').innerHTML = html;
            document.getElementById('menuDisplay').style.display = 'block';
            document.getElementById('menuTitle').innerHTML = '🍳 Меню на день';
        }

        function showWeeklyMenu(weekly) {
            let html = '';
            for (let i = 0; i < weekly.length; i++) {
                let day = weekly[i];
                html += `<div class="day-menu">
                    <div class="day-header" onclick="toggleDay(${i})">📅 ${day.day}</div>
                    <div class="day-content" id="dayContent${i}">`;
                let meals = { breakfast: '🥣 Завтрак', lunch: '🍲 Обед', dinner: '🍽️ Ужин', snack: '🍎 Перекус' };
                for (let [type, recipe] of Object.entries(day.meals)) {
                    if (recipe) {
                        let kcal = getPortionCalories(recipe);
                        html += `<div class="meal-card" onclick="showRecipe(${recipe.id})">
                            <strong>${meals[type]}:</strong> ${recipe.name} (${Math.round(kcal)} ккал)
                        </div>`;
                    }
                }


html += `</div></div>`;
            }
            document.getElementById('menuContent').innerHTML = html;
            document.getElementById('menuDisplay').style.display = 'block';
            document.getElementById('menuTitle').innerHTML = '📆 Меню на неделю';
        }

        window.toggleDay = function(i) {
            let el = document.getElementById('dayContent' + i);
            if (el) el.classList.toggle('active');
        };

        function showRecipe(id) {
            let recipe = recipes.find(r => r.id === id);
            if (!recipe) return;
            let kcal = getPortionCalories(recipe);
            let modal = document.getElementById('recipeModal');
            let content = document.getElementById('modalContent');
            content.innerHTML = `
                <span style="float:right;font-size:28px;cursor:pointer" onclick="closeModal()">&times;</span>
                <h3>${recipe.name}</h3>
                <p><strong>Ингредиенты:</strong> ${recipe.ingredients}</p>
                <p><strong>КБЖУ на порцию (${recipe.portion}г):</strong>

                🔥 ${Math.round(kcal)} ккал

                🥩 ${(recipe.protein_per_100 * recipe.portion / 100).toFixed(1)}г белков

                🧈 ${(recipe.fat_per_100 * recipe.portion / 100).toFixed(1)}г жиров

                🍚 ${(recipe.carbs_per_100 * recipe.portion / 100).toFixed(1)}г углеводов</p>
            `;
            modal.classList.add('active');
        }

        window.closeModal = function() {
            document.getElementById('recipeModal').classList.remove('active');
        };

        function showRecipes() {
            let html = '';
            recipes.forEach(r => {
                let kcal = getPortionCalories(r);
                let typeName = { breakfast: 'Завтрак', lunch: 'Обед', dinner: 'Ужин', snack: 'Перекус' }[r.mealType];
                html += `<div class="recipe-card" onclick="showRecipe(${r.id})">
                    <span class="recipe-type">${typeName}</span>
                    <h3>${r.name}</h3>
                    <p>🔥 ${Math.round(kcal)} ккал на порцию (${r.portion}г)</p>
                </div>`;
            });
            document.getElementById('recipesList').innerHTML = html;
            document.getElementById('filteredRecipesList').innerHTML = html;
        }

        function filterRecipes() {
            let search = document.getElementById('searchInput').value.toLowerCase();
            let type = document.getElementById('mealTypeFilter').value;
            let filtered = recipes.filter(r => {
                let matchName = r.name.toLowerCase().includes(search);
                let matchType = type === 'all' || r.mealType === type;
                return matchName && matchType;
            });
            let html = '';
            filtered.forEach(r => {
                let kcal = getPortionCalories(r);
                let typeName = { breakfast: 'Завтрак', lunch: 'Обед', dinner: 'Ужин', snack: 'Перекус' }[r.mealType];
                html += `<div class="recipe-card" onclick="showRecipe(${r.id})">
                    <span class="recipe-type">${typeName}</span>
                    <h3>${r.name}</h3>
                    <p>🔥 ${Math.round(kcal)} ккал</p>
                </div>`;
            });
            document.getElementById('filteredRecipesList').innerHTML = html;
        }

        document.getElementById('calculateBtn').onclick = function() {
            currentKBJU = calculateKBJU();
            if (currentKBJU) displayKBJU(currentKBJU);
        };
        document.getElementById('generateDailyBtn').onclick = function() {
            currentMenu = generateDailyMenu();
            showDailyMenu(currentMenu);
        };
        document.getElementById('generateWeeklyBtn').onclick = function() {
            currentMenu = generateWeeklyMenu();
            showWeeklyMenu(currentMenu);
        };
        document.getElementById('themeToggle').onclick = function() {
            document.b



ody.classList.toggle('dark');
            this.innerText = document.body.classList.contains('dark') ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        };
        document.getElementById('searchInput').oninput = filterRecipes;
        document.getElementById('mealTypeFilter').onchange = filterRecipes;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById(this.dataset.tab + 'Tab').classList.add('active');
            };
        });

        showRecipes();
    </script>
</body>
</html>
